<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 72px 32px;
      max-width: 680px;
      margin: 0 auto;
    }

    [contenteditable] {
      outline: none;
      cursor: text;
      display: block;
      width: 100%;
    }

    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    #content {
      font-size: 18px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 120px;
    }

    #copy {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 12px;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    #copy:hover { color: #555; background: #f0f0f0; }
  </style>
</head>
<body>
  <div id="content" contenteditable="true" data-placeholder=""></div>
  <button id="copy" onclick="copyLink()">copy link</button>

  <script>
    const BASE = '/post/';

function shortId() {
      return Math.random().toString(36).slice(2, 10);
    }

    function save(id, text) {
      localStorage.setItem('post:' + id, text);
    }

    function load(id) {
      return localStorage.getItem('post:' + id);
    }

    let currentId = location.pathname.replace(BASE, '').replace(/\//g, '');

    function init() {
      if (currentId) {
        const text = load(currentId);
        if (text !== null) {
          document.getElementById('content').innerText = text;
        } else {
          document.getElementById('content').innerText = '(post not found on this device)';
        }
      } else {
        currentId = shortId();
        history.replaceState(null, '', BASE + currentId);
        document.getElementById('content').focus();
      }
    }

    let timer;
    document.getElementById('content').addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        save(currentId, document.getElementById('content').innerText.trim());
      }, 300);
    });

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => {
        const btn = document.getElementById('copy');
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy link', 1800);
      });
    }

    init();
  </script>
</body>
</html>
