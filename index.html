<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>post</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 72px 32px;
      max-width: 680px;
      margin: 0 auto;
    }

    [contenteditable] {
      outline: none;
      cursor: text;
      display: block;
      width: 100%;
    }

    [contenteditable]:empty:before {
      content: attr(data-placeholder);
      color: #ccc;
      pointer-events: none;
    }

    #content {
      font-size: 18px;
      line-height: 1.8;
      color: #333;
      white-space: pre-wrap;
      word-wrap: break-word;
      min-height: 120px;
    }

    #copy {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 12px;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    #copy:hover { color: #555; background: #f0f0f0; }

    #list a {
      display: block;
      color: #333;
      text-decoration: none;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 16px;
      line-height: 1.4;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #list a:hover { color: #000; }

    #new-post {
      font-size: 14px;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 32px;
    }

    #new-post:hover { color: #555; }
  </style>
</head>
<body>
  <div id="home" style="display:none">
    <button id="new-post" onclick="newPost()">+ new post</button>
    <div id="list"></div>
  </div>
  <div id="editor" style="display:none">
    <div id="content" contenteditable="true" data-placeholder=""></div>
    <button id="copy" onclick="copyLink()">copy link</button>
  </div>

  <script>
    const BASE = '/post/';

function shortId() {
      return Math.random().toString(36).slice(2, 10);
    }

    function save(id, text) {
      localStorage.setItem('post:' + id, text);
    }

    function load(id) {
      return localStorage.getItem('post:' + id);
    }

    function getPosts() {
      const posts = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('post:')) {
          const id = key.slice(5);
          const text = localStorage.getItem(key);
          if (text) posts.push({ id, preview: text.slice(0, 80) });
        }
      }
      return posts;
    }

    function showList() {
      document.getElementById('home').style.display = '';
      document.getElementById('editor').style.display = 'none';
      const list = document.getElementById('list');
      const posts = getPosts();
      if (posts.length === 0) {
        list.innerHTML = '<p style="color:#ccc;font-size:15px">no posts yet</p>';
      } else {
        list.innerHTML = posts.map(p =>
          '<a href="' + BASE + p.id + '">' + p.preview.replace(/</g, '&lt;') + '</a>'
        ).join('');
      }
    }

    function showEditor(id) {
      document.getElementById('home').style.display = 'none';
      document.getElementById('editor').style.display = '';
      if (id) {
        const text = load(id);
        if (text !== null) {
          document.getElementById('content').innerText = text;
        } else {
          document.getElementById('content').innerText = '(post not found on this device)';
        }
      }
      document.getElementById('content').focus();
    }

    function newPost() {
      const id = shortId();
      history.pushState(null, '', BASE + id);
      currentId = id;
      showEditor();
    }

    let currentId = location.pathname.replace(BASE, '').replace(/\//g, '');

    function init() {
      if (currentId === 'create') {
        currentId = '';
        newPost();
      } else if (currentId) {
        showEditor(currentId);
      } else {
        showList();
      }
    }

    let timer;
    document.getElementById('content').addEventListener('input', () => {
      if (!currentId) {
        currentId = shortId();
        history.replaceState(null, '', BASE + currentId);
      }
      clearTimeout(timer);
      timer = setTimeout(() => {
        save(currentId, document.getElementById('content').innerText.trim());
      }, 300);
    });

    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => {
        const btn = document.getElementById('copy');
        btn.textContent = 'copied!';
        setTimeout(() => btn.textContent = 'copy link', 1800);
      });
    }

    init();
  </script>
</body>
</html>
